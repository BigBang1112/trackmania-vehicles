title: Trackmania Vehicles
description: Generated reference of every documented Trackmania vehicle tuning revision.
url: "https://bigbang1112.github.io"
baseurl: "/trackmania-vehicles"

theme: jekyll-theme-cayman

plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-titles-from-headings
  - jekyll-default-layout

relative_links:
  enabled: true
  collections: true

readme_index:
  with_frontmatter: true

titles_from_headings:
  enabled: true

# Only the generated Markdown reference needs to be published, not the
# tool's source code or the raw source Gbx tunings.
include:
  - README.md
  - LICENSE.txt
  - Reference

exclude:
  - Program.cs
  - TrackmaniaVehicles.csproj
  - TrackmaniaVehicles.slnx
  - Tunings
  - bin
  - obj
  - .vs
